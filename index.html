<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>臭胖子、大头鬼和小兔狗子的家</title>
<style>
/* ============================================================
   Reset & Base
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #FFF8E7;
}

/* ============================================================
   Scene Containers (Main Page)
   ============================================================ */
.scene-wrap {
  position: fixed;
  top: 0; left: 0;
  transform-origin: 0 0;
  transition: opacity 0.3s ease;
}
.scene-wrap.hidden { opacity: 0; pointer-events: none; }
.scene {
  position: absolute;
  top: 0; left: 0;
  display: none;
  background-size: 100% 100%;
  background-repeat: no-repeat;
  background-position: center;
}
.scene.active { display: block; }
.scene-landscape {
  width: 1672px; height: 941px;
  background-image: url('landscape.png');
}
.scene-portrait {
  width: 941px; height: 1672px;
  background-image: url('portrait.png');
}

/* ============================================================
   Enter Button
   ============================================================ */
.enter-btn {
  position: absolute;
  cursor: pointer;
  z-index: 10;
  transition: transform 0.15s ease;
}
.enter-btn:hover { transform: scale(1.06); }
.enter-btn:active { transform: scale(0.94); }

.scene-landscape .enter-btn { left: 675px; top: 430px; width: 325px; height: 158px; }
.scene-portrait .enter-btn  { left: 284px; top: 602px; width: 390px; height: 196px; }

/* ============================================================
   Projects Page
   ============================================================ */
.projects-page {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background:
    radial-gradient(ellipse at 30% 20%, #FFF8E0 0%, transparent 50%),
    radial-gradient(ellipse at 70% 80%, #F5ECD7 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, #FAD07A22 0%, transparent 40%),
    #FFF8E7;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 40px 20px;
  z-index: 100;
  transition: opacity 0.35s ease;
}
.projects-page.show { display: flex; }
.projects-page.fade-in { animation: fadeIn 0.35s ease-out; }

@keyframes fadeIn {
  0% { opacity: 0; transform: translateY(10px); }
  100% { opacity: 1; transform: translateY(0); }
}

.projects-title {
  font-family: 'Noto Sans SC', 'PingFang SC', sans-serif;
  font-size: clamp(24px, 4vw, 40px);
  font-weight: 900;
  color: #5D4037;
  -webkit-text-stroke: 3px white;
  paint-order: stroke fill;
  text-shadow: 2px 2px 0 rgba(0,0,0,0.05);
  margin-bottom: 12px;
  text-align: center;
}
.projects-subtitle {
  font-size: clamp(14px, 2vw, 18px);
  color: #A07850;
  margin-bottom: 20px;
  text-align: center;
}

/* Player picker */
.player-pick {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  margin-bottom: 32px;
  flex-wrap: wrap;
}
.player-label {
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 15px;
  font-weight: 700;
  color: #8D6E63;
  margin-right: 4px;
}
.player-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 10px 18px;
  background: #FFFDF5;
  border: 4px solid white;
  border-radius: 20px;
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 15px;
  font-weight: 700;
  color: #5D4037;
  cursor: pointer;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  transition: all 0.2s ease;
}
.player-btn:hover { transform: scale(1.05); }
.player-btn.active {
  background: #FFE082;
  border-color: #FFB74D;
  box-shadow: 0 4px 14px rgba(255,179,71,0.25);
}
.player-btn .pfp { font-size: 22px; }

/* ============================================================
   Project Cards Grid
   ============================================================ */
.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 24px;
  max-width: 900px;
  width: 100%;
  padding: 0 16px;
}

.project-card {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  padding: 32px 24px 28px;
  border: 8px solid white;
  border-radius: 24px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.08), 0 2px 6px rgba(0,0,0,0.04);
  cursor: pointer;
  text-decoration: none;
  color: inherit;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
  position: relative;
}
.project-card:hover {
  transform: translateY(-6px) scale(1.03);
  box-shadow: 0 10px 28px rgba(0,0,0,0.12), 0 4px 12px rgba(0,0,0,0.06);
}
.project-card:active { transform: translateY(-2px) scale(0.98); }

/* Stitch border */
.project-card::after {
  content: '';
  position: absolute;
  inset: -5px;
  border: 2px dashed rgba(196,149,106,0.2);
  border-radius: 28px;
  pointer-events: none;
}

/* Macaron color per card */
.project-card:nth-child(1) { background: #C8E6C9; } /* 薄荷绿 - 黑白棋 */
.project-card:nth-child(2) { background: #BBDEFB; } /* 淡蓝 - 2048 */
.project-card:nth-child(3) { background: #E1BEE7; } /* 淡紫 - 魔力宝贝 */
.project-card:nth-child(4) { background: #FFF9C4; } /* 柠檬黄 - 英语学习 */
.project-card:nth-child(5) { background: #F8BBD0; } /* 樱花粉 - Our Wedding */
.project-card:nth-child(6) { background: #FFCCBC; } /* 蜜桃橙 - 幸福一家人 */

.card-icon {
  font-size: 48px;
  line-height: 1;
}
.card-name {
  font-family: 'Noto Sans SC', 'PingFang SC', sans-serif;
  font-size: 20px;
  font-weight: 700;
  color: #5D4037;
  text-align: center;
}
.card-desc {
  font-size: 13px;
  color: #A07850;
  text-align: center;
  line-height: 1.5;
}

/* Back button */
.back-btn {
  position: fixed;
  top: 20px; left: 20px;
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 10px 20px;
  background: #FFFDF5;
  border: 6px solid white;
  border-radius: 50px;
  box-shadow: 0 3px 12px rgba(0,0,0,0.08);
  cursor: pointer;
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 16px;
  color: #5D4037;
  font-weight: 700;
  z-index: 200;
  transition: transform 0.15s ease, box-shadow 0.15s ease;
}
.back-btn:hover { transform: scale(1.05); box-shadow: 0 4px 16px rgba(0,0,0,0.12); }
.back-btn:active { transform: scale(0.96); }
.back-arrow { font-size: 20px; }

/* Animation */
@keyframes pop-in {
  0% { opacity: 0; }
  100% { opacity: 1; }
}
.scene.active { animation: pop-in 0.3s ease-out; }

/* ============================================================
   Password Overlay — Sticker Keypad
   ============================================================ */
.pw-overlay {
  position: fixed;
  inset: 0;
  z-index: 300;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(93, 64, 55, 0.4);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
}
.pw-overlay.show { opacity: 1; pointer-events: auto; }

.pw-dialog {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  padding: 36px 32px 32px;
  background:
    radial-gradient(circle at 20% 15%, #FFF8E0 0%, transparent 40%),
    radial-gradient(circle at 80% 85%, #FCE4EC 0%, transparent 40%),
    #FFFDF5;
  border: 8px solid white;
  border-radius: 28px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.18), 0 2px 10px rgba(0,0,0,0.06);
  max-width: 340px;
  width: calc(100% - 40px);
  position: relative;
  animation: dialogIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
  /* Sticker edge — dashed stitch */
  outline: 2px dashed rgba(196,149,106,0.25);
  outline-offset: -6px;
}
@keyframes dialogIn {
  0% { opacity: 0; transform: translateY(16px) scale(0.95); }
  100% { opacity: 1; transform: translateY(0) scale(1); }
}

.pw-dialog.shake { animation: shake 0.45s ease; }
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  15% { transform: translateX(-9px) rotate(-1deg); }
  30% { transform: translateX(9px) rotate(1deg); }
  50% { transform: translateX(-6px); }
  70% { transform: translateX(5px); }
  85% { transform: translateX(-3px); }
}

.pw-title {
  font-family: 'Noto Sans SC', 'PingFang SC', sans-serif;
  font-size: 22px;
  font-weight: 900;
  color: #5D4037;
  letter-spacing: 1px;
}
.pw-subtitle {
  font-size: 13px;
  color: #A07850;
  text-align: center;
}

/* ---- Display (sticker note) ---- */
.pw-display {
  width: 100%;
  height: 48px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  background: #FFFEF9;
  border: 3px solid #E0D5C5;
  border-radius: 14px;
  font-size: 22px;
  letter-spacing: 6px;
  color: #5D4037;
  position: relative;
}
.pw-display::before {
  content: '';
  position: absolute;
  top: -3px; right: 18px;
  width: 20px; height: 10px;
  background: #FFCC80;
  border-radius: 0 0 6px 6px;
  /* Tape mark on sticker note */;
}
.pw-display.error {
  border-color: #EF9A9A;
  animation: shake 0.45s ease;
}
.pw-dot { color: #5D4037; }
.pw-dot.empty { color: #D7CCC8; }

/* ---- Number Pad Grid ---- */
.pw-keypad {
  display: grid;
  grid-template-columns: repeat(3, 72px);
  gap: 10px;
}
.pw-key {
  width: 72px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: none;
  border-radius: 16px;
  cursor: pointer;
  font-family: 'Noto Sans SC', 'PingFang SC', sans-serif;
  font-size: 22px;
  font-weight: 800;
  color: #5D4037;
  border: 4px solid white;
  box-shadow: 0 3px 10px rgba(0,0,0,0.08), 0 1px 3px rgba(0,0,0,0.04);
  transition: transform 0.12s ease, box-shadow 0.12s ease;
  position: relative;
}
/* Macaron sticker colors — each button slightly rotated for hand-drawn feel */
.pw-key:nth-child(1)  { background: #F8BBD0; transform: rotate(-1.5deg); } /* 1 - pink */
.pw-key:nth-child(2)  { background: #CE93D8; transform: rotate(0.8deg); }  /* 2 - lilac */
.pw-key:nth-child(3)  { background: #90CAF9; transform: rotate(1.2deg); }  /* 3 - blue */
.pw-key:nth-child(4)  { background: #A5D6A7; transform: rotate(-0.6deg); } /* 4 - green */
.pw-key:nth-child(5)  { background: #FFF59D; transform: rotate(1.5deg); }  /* 5 - yellow */
.pw-key:nth-child(6)  { background: #FFCC80; transform: rotate(-1deg); }   /* 6 - orange */
.pw-key:nth-child(7)  { background: #EF9A9A; transform: rotate(0.5deg); }  /* 7 - coral */
.pw-key:nth-child(8)  { background: #80CBC4; transform: rotate(-1.8deg); } /* 8 - teal */
.pw-key:nth-child(9)  { background: #B39DDB; transform: rotate(1deg); }    /* 9 - purple */
.pw-key:nth-child(10) { background: #BCAAA4; transform: rotate(-0.3deg); } /* ⌫ - brown */
.pw-key:nth-child(11) { background: #FFE082; transform: rotate(0deg); }    /* 0 - gold */
.pw-key:nth-child(12) { background: #81C784; transform: rotate(0.8deg); }  /* ✓ - green */

/* Tiny decorative tape on each button */
.pw-key::before {
  content: '';
  position: absolute;
  top: -2px;
  width: 16px; height: 6px;
  border-radius: 2px;
  opacity: 0.5;
}
.pw-key:nth-child(odd)::before  { left: 14px; background: rgba(255,255,255,0.7); }
.pw-key:nth-child(even)::before { right: 14px; background: rgba(255,255,255,0.7); }

.pw-key:hover {
  transform: translateY(-3px) scale(1.06) !important;
  box-shadow: 0 6px 20px rgba(0,0,0,0.13), 0 2px 6px rgba(0,0,0,0.06);
  z-index: 2;
}
.pw-key:active {
  transform: translateY(1px) scale(0.94) !important;
  box-shadow: 0 2px 6px rgba(0,0,0,0.08);
}

.pw-key.action { font-size: 16px; }
.pw-key.delete { font-size: 20px; }

.pw-error-msg {
  font-size: 13px;
  color: #E57373;
  display: none;
  font-weight: 600;
}
.pw-error-msg.visible { display: block; }

.pw-close {
  position: absolute;
  top: 12px; right: 16px;
  cursor: pointer;
  font-size: 20px;
  color: #A07850;
  transition: transform 0.15s;
  line-height: 1;
  z-index: 5;
}
.pw-close:hover { transform: scale(1.2); }
</style>
</head>
<body>

<!-- ================================================================
     Main Page (Design Images as Background)
     ================================================================ -->
<div class="scene-wrap" id="sceneWrap">
  <div class="scene scene-landscape active" id="sceneLand">
    <div class="enter-btn" id="enterBtnLand" title="进入"></div>
  </div>
  <div class="scene scene-portrait" id="scenePort">
    <div class="enter-btn" id="enterBtnPort" title="进入"></div>
  </div>
</div>

<!-- ================================================================
     Projects List Page
     ================================================================ -->
<div class="projects-page" id="projectsPage">
  <div class="back-btn" id="backBtn">
    <span class="back-arrow">&#9664;</span> 回家
  </div>

  <h1 class="projects-title">我们的小天地</h1>
  <p class="projects-subtitle">选一个喜欢的，一起玩吧～</p>

  <!-- Player picker -->
  <div class="player-pick" id="playerPick">
    <span class="player-label">你是谁呀？</span>
    <button class="player-btn" data-name="臭胖子"><span class="pfp">&#128083;</span>臭胖子</button>
    <button class="player-btn" data-name="小兔狗子"><span class="pfp">&#128048;</span>小兔狗子</button>
    <button class="player-btn" data-name="大头鬼"><span class="pfp">&#128127;</span>大头鬼</button>
  </div>

  <div class="cards-grid">
    <!-- 黑白棋 -->
    <a class="project-card" href="https://reversi.cw2017.com" target="_blank">
      <span class="card-icon">&#9898;&#9899;</span>
      <span class="card-name">黑白棋</span>
      <span class="card-desc">翻转吧小棋子</span>
    </a>

    <!-- 2048 -->
    <a class="project-card" href="https://2048.cw2017.com" target="_blank">
      <span class="card-icon">2048</span>
      <span class="card-name">2048</span>
      <span class="card-desc">滑动合并凑大数</span>
    </a>

    <!-- 魔力宝贝 -->
    <a class="project-card" href="https://cg.cw2017.com" target="_blank">
      <span class="card-icon">&#129498;</span>
      <span class="card-name">魔力宝贝</span>
      <span class="card-desc">魔法世界冒险</span>
    </a>

    <!-- 英语学习 -->
    <a class="project-card" href="https://english.cw2017.com" target="_blank">
      <span class="card-icon">&#128218;</span>
      <span class="card-name">英语学习</span>
      <span class="card-desc">和小兔一起学英语</span>
    </a>

    <!-- 幸福一家人 -->
    <a class="project-card" href="https://xingfu.cw2017.com" target="_blank">
      <span class="card-icon">&#127860;</span>
      <span class="card-name">幸福一家人</span>
      <span class="card-desc">一家人的冒险故事</span>

    <!-- Our Wedding -->
    <a class="project-card" href="https://782745.wixsite.com/cw2017" target="_blank">
      <span class="card-icon">&#128146;</span>
      <span class="card-name">Our Wedding</span>
      <span class="card-desc">我们的婚礼回忆</span>
    </a>
  </div>
</div>

<!-- ================================================================
     Password Overlay — Sticker Keypad
     ================================================================ -->
<div class="pw-overlay" id="pwOverlay">
  <div class="pw-dialog" id="pwDialog">
    <span class="pw-close" id="pwClose" title="关闭">&times;</span>
    <div class="pw-title">这是我们的小天地</div>
    <div class="pw-subtitle">输入密码才能进入哦～</div>

    <!-- Dots display -->
    <div class="pw-display" id="pwDisplay">
      <span class="pw-dot empty">&bull;</span>
      <span class="pw-dot empty">&bull;</span>
      <span class="pw-dot empty">&bull;</span>
      <span class="pw-dot empty">&bull;</span>
      <span class="pw-dot empty">&bull;</span>
      <span class="pw-dot empty">&bull;</span>
      <span class="pw-dot empty">&bull;</span>
      <span class="pw-dot empty">&bull;</span>
    </div>

    <!-- Number pad -->
    <div class="pw-keypad" id="pwKeypad">
      <button class="pw-key" data-key="1">1</button>
      <button class="pw-key" data-key="2">2</button>
      <button class="pw-key" data-key="3">3</button>
      <button class="pw-key" data-key="4">4</button>
      <button class="pw-key" data-key="5">5</button>
      <button class="pw-key" data-key="6">6</button>
      <button class="pw-key" data-key="7">7</button>
      <button class="pw-key" data-key="8">8</button>
      <button class="pw-key" data-key="9">9</button>
      <button class="pw-key delete action" data-key="delete">&#9003;</button>
      <button class="pw-key" data-key="0">0</button>
      <button class="pw-key action" data-key="enter">&#10003;</button>
    </div>

    <div class="pw-error-msg" id="pwError">密码不对哦，再试一次～</div>
  </div>
</div>

<script>
(function() {
  // =============================================================
  //  Password config — change only PASSWORD_HASH
  //  Generate: echo -n "your_password" | shasum -a 256
  // =============================================================
  var PASSWORD_HASH = '8f980fe6000d8fedc2273057a186ddb95e7d77761909c0ca42f234a5e0e2b816';
  var COOKIE_NAME = 'family_auth';
  var COOKIE_DAYS = 180; // 6 months
  var MAX_DIGITS = 8;

  // Scene & page elements
  var sceneWrap = document.getElementById('sceneWrap');
  var sceneLand = document.getElementById('sceneLand');
  var scenePort = document.getElementById('scenePort');
  var projectsPage = document.getElementById('projectsPage');

  // Password overlay elements
  var pwOverlay = document.getElementById('pwOverlay');
  var pwDialog = document.getElementById('pwDialog');
  var pwDisplay = document.getElementById('pwDisplay');
  var pwError  = document.getElementById('pwError');
  var pwClose  = document.getElementById('pwClose');
  var pwKeypad = document.getElementById('pwKeypad');

  var currentInput = '';

  function isLandscape() {
    return window.innerWidth > window.innerHeight;
  }

  function updateMainScene() {
    if (isLandscape()) {
      sceneLand.classList.add('active');
      scenePort.classList.remove('active');
      var sw = window.innerWidth / 1672;
      var sh = window.innerHeight / 941;
      var s = Math.min(sw, sh);
      var ox = (window.innerWidth - 1672 * s) / 2;
      var oy = (window.innerHeight - 941 * s) / 2;
      sceneWrap.style.width = '1672px';
      sceneWrap.style.height = '941px';
      sceneWrap.style.transform = 'translate(' + ox + 'px, ' + oy + 'px) scale(' + s + ')';
    } else {
      scenePort.classList.add('active');
      sceneLand.classList.remove('active');
      var sw = window.innerWidth / 941;
      var sh = window.innerHeight / 1672;
      var s = Math.min(sw, sh);
      var ox = (window.innerWidth - 941 * s) / 2;
      var oy = (window.innerHeight - 1672 * s) / 2;
      sceneWrap.style.width = '941px';
      sceneWrap.style.height = '1672px';
      sceneWrap.style.transform = 'translate(' + ox + 'px, ' + oy + 'px) scale(' + s + ')';
    }
  }

  function showProjects() {
    sceneWrap.classList.add('hidden');
    projectsPage.classList.add('show', 'fade-in');
  }

  function showMain() {
    sceneWrap.classList.remove('hidden');
    projectsPage.classList.remove('show', 'fade-in');
    updateMainScene();
  }

  // ---- Cookie helpers ----

  function getCookie(name) {
    var match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
    return match ? match[2] : null;
  }

  function setCookie(name, value, days) {
    var d = new Date();
    d.setTime(d.getTime() + days * 24 * 60 * 60 * 1000);
    document.cookie = name + '=' + value + ';expires=' + d.toUTCString() + ';path=/;SameSite=Lax';
  }

  async function sha256(message) {
    var msgBuffer = new TextEncoder().encode(message);
    var hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
    var hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(function(b) { return b.toString(16).padStart(2, '0'); }).join('');
  }

  // ---- Display ----

  function updateDisplay() {
    var dots = pwDisplay.querySelectorAll('.pw-dot');
    for (var i = 0; i < dots.length; i++) {
      if (i < currentInput.length) {
        dots[i].textContent = '\u2022'; // filled dot
        dots[i].classList.remove('empty');
      } else {
        dots[i].textContent = '\u2022';
        dots[i].classList.add('empty');
      }
    }
  }

  function resetInput() {
    currentInput = '';
    updateDisplay();
    pwDisplay.classList.remove('error');
    pwError.classList.remove('visible');
  }

  // ---- Password gate ----

  function showPasswordOverlay() {
    resetInput();
    pwOverlay.classList.add('show');
  }

  function hidePasswordOverlay() {
    pwOverlay.classList.remove('show');
  }

  async function tryPassword(inputVal) {
    var inputHash = await sha256(inputVal);
    return inputHash === PASSWORD_HASH;
  }

  function isAuthenticated() {
    var cookieVal = getCookie(COOKIE_NAME);
    return cookieVal === PASSWORD_HASH;
  }

  function setAuthenticated() {
    setCookie(COOKIE_NAME, PASSWORD_HASH, COOKIE_DAYS);
  }

  // ---- Event handlers ----

  function handleEnterClick() {
    if (isAuthenticated()) {
      showProjects();
      return;
    }
    showPasswordOverlay();
  }

  async function handleKeyPress(key) {
    if (key === 'delete') {
      if (currentInput.length > 0) {
        currentInput = currentInput.slice(0, -1);
        updateDisplay();
      }
      return;
    }

    if (key === 'enter') {
      if (currentInput.length === 0) return;

      var ok = await tryPassword(currentInput);
      if (ok) {
        setAuthenticated();
        hidePasswordOverlay();
        showProjects();
      } else {
        pwDisplay.classList.add('error');
        pwDialog.classList.add('shake');
        pwError.classList.add('visible');
        currentInput = '';
        updateDisplay();
        setTimeout(function() {
          pwDisplay.classList.remove('error');
          pwDialog.classList.remove('shake');
        }, 450);
      }
      return;
    }

    // Digit key
    if (currentInput.length < MAX_DIGITS) {
      currentInput += key;
      updateDisplay();
    }
  }

  // Enter button → password check
  document.getElementById('enterBtnLand').addEventListener('click', handleEnterClick);
  document.getElementById('enterBtnPort').addEventListener('click', handleEnterClick);

  // Keypad clicks
  pwKeypad.addEventListener('click', function(e) {
    var btn = e.target.closest('.pw-key');
    if (!btn) return;
    handleKeyPress(btn.dataset.key);
  });

  // Keyboard support (physical keyboard on desktop)
  pwOverlay.addEventListener('keydown', function(e) {
    if (!pwOverlay.classList.contains('show')) return;
    if (e.key >= '0' && e.key <= '9') {
      handleKeyPress(e.key);
    } else if (e.key === 'Backspace' || e.key === 'Delete') {
      e.preventDefault();
      handleKeyPress('delete');
    } else if (e.key === 'Enter') {
      e.preventDefault();
      handleKeyPress('enter');
    }
  });

  // Focus the overlay so it can receive key events
  pwOverlay.tabIndex = 0;

  // Close button
  pwClose.addEventListener('click', function() {
    hidePasswordOverlay();
    resetInput();
  });

  // ---- Player Picker ----
  var selectedName = localStorage.getItem('playerName2048') || '';
  var playerBtns = document.querySelectorAll('.player-btn');
  var projectCards = document.querySelectorAll('.project-card');

  function applyPlayerName(name) {
    selectedName = name;
    localStorage.setItem('playerName2048', name);
    // Update all card links
    for (var i = 0; i < projectCards.length; i++) {
      var card = projectCards[i];
      var baseHref = card.getAttribute('data-href') || card.getAttribute('href');
      if (!card.getAttribute('data-href')) {
        card.setAttribute('data-href', baseHref);
      }
      if (name) {
        card.href = baseHref + (baseHref.indexOf('?') > -1 ? '&' : '?') + 'name=' + encodeURIComponent(name);
      } else {
        card.href = baseHref;
      }
    }
    // Highlight active button
    for (var j = 0; j < playerBtns.length; j++) {
      var btn = playerBtns[j];
      if (btn.dataset.name === name) {
        btn.classList.add('active');
      } else {
        btn.classList.remove('active');
      }
    }
  }

  // Bind button clicks
  document.getElementById('playerPick').addEventListener('click', function(e) {
    var btn = e.target.closest('.player-btn');
    if (!btn) return;
    applyPlayerName(btn.dataset.name);
  });

  // Restore saved selection
  if (selectedName) {
    applyPlayerName(selectedName);
  }

  // Back button → return to main
  document.getElementById('backBtn').addEventListener('click', showMain);

  // Resize
  window.addEventListener('resize', function() {
    if (!projectsPage.classList.contains('show')) {
      updateMainScene();
    }
  });
  window.addEventListener('orientationchange', function() {
    if (!projectsPage.classList.contains('show')) {
      setTimeout(updateMainScene, 100);
    }
  });

  updateMainScene();
})();
</script>

</body>
</html>
